name: Bug report
description: Something produces wrong output or broken behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Title format:** `bug: short description of what is wrong`
        Example: `bug: seeding calc shows NaN when bypass mode is active`

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect?
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Which tool?
      options:
        - cell-count
        - seeding-calc
        - experiment-layout
        - stain-timer
        - thermal-to-laser
        - drug-dosage
        - other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the tool at ...
        2. Enter ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste any console errors or screenshots here.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: "e.g. Safari 17, macOS 15"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
