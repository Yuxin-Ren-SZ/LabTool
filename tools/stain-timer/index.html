<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="../../assets/js/labtools-theme.js"></script>
  <title>Stain Timer · LabTools</title>
  <link rel="stylesheet" href="../../assets/css/labtools.css"/>
  <script src="../../assets/js/labtools-calc.js"></script>
  <style>
    /* ── Tool-local tokens ── */
    :root {
      --slot-blue-glow: 0 0 0 3px rgba(62, 114, 201, 0.15);
      --slot-green-glow: 0 0 0 3px rgba(52, 135, 94, 0.14);
    }
    [data-theme="dark"] {
      --slot-blue-glow: 0 0 0 3px rgba(103, 144, 224, 0.30);
      --slot-green-glow: 0 0 0 3px rgba(91, 191, 94, 0.30);
    }

    /* ── Card width (base styles live in labtools.css .card) ── */
    .card { max-width: 660px; }

    /* Mobile padding override — slightly tighter than the shared 20px/16px default */
    @media (max-width: 520px) { .card { padding: 18px 14px; } }

    /* ── Protocol editor table ── */
    .proto-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
      margin-bottom: 12px;
    }
    .proto-table th {
      font-size: var(--fs-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      padding: 0 6px 8px;
      text-align: left;
      white-space: nowrap;
    }
    .proto-table th.col-num   { width: 32px; text-align: center; }
    .proto-table th.col-sol   { /* flex */ }
    .proto-table th.col-dur   { width: 170px; }
    .proto-table th.col-slot  { width: 68px; }
    .proto-table th.col-acts  { width: 72px; }

    .proto-row td { padding: 3px 4px; vertical-align: middle; }
    .proto-row td.col-num {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 600;
      width: 32px;
    }
    .proto-row input[type="text"],
    .proto-row input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.84rem;
      font-family: var(--font);
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }
    .proto-row input:focus         { border-color: var(--blue); }
    .proto-row input::placeholder  { color: var(--text-placeholder); }
    .proto-row input.error         { border-color: var(--red); background: var(--red-bg); }
    .proto-row input.warning       { border-color: var(--yellow-border); background: var(--yellow-bg); color: var(--yellow-dark); }

    .dur-wrap { display: flex; align-items: center; gap: 4px; }
    .dur-wrap span { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; }
    .dur-wrap input:nth-of-type(1) { width: 58px; }
    .dur-wrap input:nth-of-type(2) { width: 64px; }

    .acts-cell { display: flex; gap: 2px; align-items: center; }
    .act-btn {
      border: none; background: transparent; cursor: pointer;
      color: var(--text-dim); font-size: 0.82rem;
      padding: 4px 5px; border-radius: var(--radius-sm);
      transition: color 0.12s, background 0.12s;
      line-height: 1;
    }
    .act-btn:hover { background: var(--surface-hover); color: var(--text); }
    .act-btn.del:hover { background: var(--red-bg); color: var(--red); }

    /* ── Drag handle ── */
    .col-drag { width: 20px; padding: 0 2px !important; }
    .drag-handle {
      cursor: grab; color: var(--text-dim); font-size: 0.9rem;
      padding: 4px 3px; line-height: 1; user-select: none;
      display: flex; align-items: center;
    }
    .drag-handle:active { cursor: grabbing; }
    .proto-row.drag-over { outline: 2px solid var(--blue); outline-offset: -2px; }
    .proto-row.dragging  { opacity: 0.4; }

    .add-step-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 7px 14px;
      font-size: 0.82rem;
      font-family: var(--font);
      color: var(--text-muted);
      cursor: pointer;
      width: 100%;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      margin-bottom: 16px;
    }
    .add-step-btn:hover { border-color: var(--blue); color: var(--blue-dark); background: var(--blue-bg); }
    .add-step-btn.secondary { border-style: solid; color: var(--text-muted); }
    .add-step-btn.secondary:hover { border-color: var(--red, #c0392b); color: var(--red, #c0392b); background: var(--red-bg, #fdf0ef); }

    /* ── Settings block ── */
    .settings-block {
      background: var(--surface-subtle);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .alarm-row {
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      user-select: none;
    }
    .alarm-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--blue-dark);
      cursor: pointer; flex-shrink: 0; margin: 0;
    }
    .alarm-row-label { font-size: 0.84rem; font-weight: 600; color: var(--text-secondary); }
    .alarm-row-sub   { font-size: var(--fs-xs); color: var(--text-muted); font-weight: 400; }

    /* ── Bottom action row ── */
    .bottom-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .bottom-row .spacer { flex: 1; }
    .btn-run {
      padding: 9px 20px;
      background: var(--blue-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-run:hover   { opacity: 0.88; }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Panel 2: timer display ── */
    .timer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .btn-back {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      font-size: 0.80rem;
      font-family: var(--font);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-back:hover { background: var(--surface-hover); color: var(--text); }

    .current-step-block {
      background: var(--blue-bg);
      border: 1.5px solid var(--blue-border);
      border-radius: var(--radius-lg);
      padding: 20px 22px 18px;
      margin-bottom: 14px;
      text-align: center;
    }
    .current-step-block.done-state {
      background: var(--green-bg);
      border-color: var(--green-border);
    }
    .step-counter {
      font-size: var(--fs-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--blue-dark);
      margin-bottom: 4px;
    }
    .done-state .step-counter { color: var(--green-dark); }
    .step-slot-label {
      font-size: 0.75rem;
      color: var(--blue-dark);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .done-state .step-slot-label { color: var(--green-dark); }
    .step-solution {
      font-size: 1.30rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
    }
    .countdown {
      font-size: 2.8rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--blue-dark);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .done-state .countdown { color: var(--green-dark); }
    .progress-track {
      width: 100%;
      height: 7px;
      background: var(--blue-border);
      border-radius: 99px;
      overflow: hidden;
    }
    .done-state .progress-track { background: var(--green-border); }
    .progress-fill {
      height: 100%;
      background: var(--blue-dark);
      border-radius: 99px;
      transition: width 0.1s linear;
      width: 0%;
    }
    .done-state .progress-fill { background: var(--green-dark); }

    .slot-rack {
      background: var(--surface-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 13px;
      margin-bottom: 14px;
    }
    .slot-rack[hidden] { display: none; }
    .slot-rack-header {
      font-size: var(--fs-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .slot-rack-status {
      font-size: 0.81rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .slot-rack-status.unassigned {
      color: var(--red);
      font-weight: 600;
    }
    .slot-rack-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .slot-box {
      width: 34px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.66rem;
      font-weight: 700;
      line-height: 1;
      transition: border-color 0.18s, background 0.18s, color 0.18s, transform 0.18s, box-shadow 0.18s;
    }
    .slot-box.active {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
      color: #fff;
      box-shadow: var(--slot-blue-glow);
      animation: slotPulse 1.35s ease-in-out infinite;
    }
    .done-state .slot-box.active {
      background: var(--green-dark);
      border-color: var(--green-dark);
      box-shadow: var(--slot-green-glow);
    }
    @keyframes slotPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .timer-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .btn-start {
      flex: 1;
      padding: 10px 16px;
      background: var(--blue-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.15s;
      min-width: 100px;
    }
    .btn-start:hover { opacity: 0.88; }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start.paused { background: var(--green-dark); }

    .btn-skip, .btn-reset-timer {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: transparent;
      font-size: 0.84rem;
      font-family: var(--font);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-skip:hover, .btn-reset-timer:hover { background: var(--surface-hover); color: var(--text); }
    .btn-skip:disabled, .btn-reset-timer:disabled { opacity: 0.35; cursor: not-allowed; }

    .next-step-strip {
      background: var(--surface-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 10px 13px;
      font-size: 0.81rem;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .next-step-strip strong { color: var(--text-secondary); }

    /* ── All steps list ── */
    .steps-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 14px;
    }
    .sl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.81rem;
      transition: background 0.12s;
    }
    .sl-row:last-child { border-bottom: none; }
    .sl-row.sl-done     { color: var(--text-dim); }
    .sl-row.sl-current  { background: var(--blue-bg); color: var(--text); font-weight: 600; }
    .sl-row.sl-upcoming { color: var(--text-muted); }
    .sl-icon { width: 16px; flex-shrink: 0; font-size: 0.72rem; text-align: center; }
    .sl-num  { width: 22px; flex-shrink: 0; font-size: 0.72rem; color: var(--text-dim); text-align: right; }
    .sl-sol  { flex: 1; }
    .sl-dur  { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }
    .sl-slot { font-size: 0.72rem; color: var(--text-dim); white-space: nowrap; }
    .sl-row.sl-current .sl-dur  { color: var(--blue-dark); font-weight: 600; }
    .sl-row.sl-current .sl-slot { color: var(--blue-dark); }

    .done-banner {
      text-align: center;
      padding: 18px;
      background: var(--green-bg);
      border: 1.5px solid var(--green-border);
      border-radius: var(--radius-lg);
      color: var(--green-dark);
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 14px;
    }
    .done-banner .done-sub {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--green);
      margin-top: 4px;
    }

    .validation-msg {
      font-size: 0.78rem;
      color: var(--red);
      font-weight: 600;
      min-height: 18px;
      margin-bottom: 6px;
    }

    /* Import label acts as a button — needs pointer cursor */
    .bottom-row label.btn-reset { cursor: pointer; }

    @media (max-width: 520px) {
      .countdown { font-size: 2.2rem; }
      .proto-table th.col-slot,
      .proto-row td.col-slot { display: none; }
    }
  </style>
</head>
<body>

<nav class="lt-nav">
  <a class="lt-nav-brand" href="../../index.html">🔬 LabTools</a>
  <span class="lt-nav-sep">/</span>
  <span class="lt-nav-page">Stain Timer</span>
</nav>

<div class="lt-page-body">
<div class="card">

  <h1 class="lt-tool-title">⏱ Stain Timer</h1>
  <p class="lt-tool-subtitle">Configurable step-by-step staining protocol timer</p>

  <!-- Step bar -->
  <div class="step-bar">
    <div class="step-pip active" id="pip1"><div class="dot">1</div>Protocol</div>
    <div class="step-connector" id="conn1"></div>
    <div class="step-pip" id="pip2"><div class="dot">2</div>Run</div>
  </div>

  <!-- ══════════════════════════════════════════════
       Panel 1 — Protocol Setup
  ══════════════════════════════════════════════ -->
  <div class="step-panel active" id="panel-setup">

    <div class="lt-section-label lt-section-label--tight">Protocol Steps</div>

    <table class="proto-table">
      <thead>
        <tr>
          <th class="col-drag"></th>
          <th class="col-num">#</th>
          <th class="col-sol">Solution</th>
          <th class="col-dur">Duration</th>
          <th class="col-slot">Slot</th>
          <th class="col-acts"></th>
        </tr>
      </thead>
      <tbody id="proto-body"></tbody>
    </table>

    <button class="add-step-btn" onclick="addStep()">＋ Add Step</button>
    <button class="add-step-btn secondary" onclick="clearProtocol()">✕ Clear All</button>

    <div class="lt-section-label lt-section-label--tight">Settings</div>
    <div class="settings-block">
      <label class="alarm-row">
        <input type="checkbox" id="alarm-toggle" checked />
        <span>
          <span class="alarm-row-label">Enable alarm buzzer</span>
          <span class="alarm-row-sub"> — beeps when each step completes</span>
        </span>
      </label>
    </div>

    <div class="validation-msg" id="validation-msg"></div>
    <div class="bottom-row">
      <button class="btn-reset" onclick="exportProtocol()">⬇ Export Protocol</button>
      <label class="btn-reset">
        ⬆ Import Protocol
        <input type="file" accept=".csv" id="import-input" style="display:none" onchange="importProtocol(event)"/>
      </label>
      <div class="spacer"></div>
      <button class="btn-run" id="btn-run" onclick="goToRun()">Run Protocol →</button>
    </div>

  </div><!-- /panel-setup -->

  <!-- ══════════════════════════════════════════════
       Panel 2 — Run Timer
  ══════════════════════════════════════════════ -->
  <div class="step-panel" id="panel-run">

    <div class="timer-header">
      <button class="btn-back" onclick="goToSetup()">← Back to Protocol</button>
    </div>

    <!-- Current step display -->
    <div class="current-step-block" id="current-block">
      <div class="step-counter" id="step-counter">Step 1 of —</div>
      <div class="step-slot-label" id="step-slot-label"></div>
      <div class="step-solution" id="step-solution">—</div>
      <div class="countdown" id="countdown">--:--</div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="slot-rack" id="slot-rack" hidden>
      <div class="slot-rack-header">Slide Position</div>
      <div class="slot-rack-status" id="slot-rack-status"></div>
      <div class="slot-rack-row" id="slot-rack-row"></div>
    </div>

    <!-- Controls -->
    <div class="timer-controls">
      <button class="btn-start" id="btn-start" onclick="toggleStartPause()">▶ Start</button>
      <button class="btn-skip"  id="btn-skip"  onclick="skipStep()" disabled>⏭ Skip</button>
      <button class="btn-reset-timer" id="btn-reset-timer" onclick="resetTimer()">↺ Reset</button>
    </div>

    <!-- Next step -->
    <div class="next-step-strip" id="next-strip"></div>

    <!-- All steps list -->
    <div class="lt-section-label lt-section-label--tight">All Steps</div>
    <div class="steps-list" id="steps-list"></div>

    <!-- Done banner (hidden until finished) -->
    <div class="done-banner" id="done-banner" style="display:none">
      ✓ Protocol complete!
      <div class="done-sub" id="done-sub"></div>
    </div>

    <div class="bottom-row">
      <button class="btn-reset" id="btn-export-results" onclick="exportResults()" disabled>⬇ Export Results</button>
    </div>

  </div><!-- /panel-run -->

</div>
</div><!-- /lt-page-body -->

<footer class="lt-footer">LabTools · Open source lab utilities</footer>

<script>
// ─────────────────────────────────────────────────────────────
// Default protocol (short testing protocol — 3 × 5-second steps)
// ─────────────────────────────────────────────────────────────

/** Pre-loaded protocol so the table is not empty on first open. */
const DEFAULT_PROTOCOL = [
  { solution: 'Step A', durationMin: 0, durationSec: 5, slot: '1' },
  { solution: 'Step B', durationMin: 0, durationSec: 5, slot: '2' },
  { solution: 'Step C', durationMin: 0, durationSec: 5, slot: '3' },
];

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────

/**
 * Live protocol array. Each entry is a step object:
 *   { solution: string, durationMin: number|'', durationSec: number|'', slot: string }
 * Mutated directly by the editor; also fully replaced by importProtocol().
 */
let protocol = DEFAULT_PROTOCOL.map(s => ({ ...s }));

/** 0-based index of the currently running or upcoming step. */
let currentStep     = 0;
/** Timer lifecycle: 'idle' | 'running' | 'paused' | 'done' */
let timerState      = 'idle';
/** Absolute wall-clock timestamp (ms) when the current step will finish. */
let stepEndTime     = null;
/** Milliseconds remaining when the timer was last paused. */
let pausedRemaining = null;
/** setInterval handle for the 100 ms countdown tick. */
let tickInterval    = null;

/**
 * Per-step results collected during a run.
 * Each entry mirrors a protocol step and adds:
 *   startedAt: string | null   — wall-clock HH:MM:SS when step started
 *   actualMs:  number | null   — actual elapsed milliseconds
 */
let stepResults  = [];
/** Wall-clock timestamp (ms) when the current step's timer was first started. */
let stepStartTs  = null;
/**
 * Row indices flagged by validateProtocol() for slot or solution conflicts.
 * Used to highlight cells in the protocol table.
 */
let validationWarnings = { solution: new Set(), slot: new Set() };

/** Source row index captured at dragstart for drag-and-drop reordering. */
let dragSrcIndex = null;

/** Web Audio API context — created lazily on first playAlarm() call. */
let audioCtx = null;

// ─────────────────────────────────────────────────────────────
// DOM ↔ protocol synchronisation
// ─────────────────────────────────────────────────────────────

/**
 * Read the current input values from every rendered .proto-row and
 * write them back into the protocol array. Call this before any
 * operation that reads protocol[] after the user may have typed
 * (e.g. before goToRun() or before a drag-and-drop reorder).
 */
function syncProtocolFromDOM() {
  document.querySelectorAll('.proto-row').forEach((tr, i) => {
    const inputs = tr.querySelectorAll('input');
    protocol[i].solution   = inputs[0].value;
    protocol[i].durationMin = inputs[1].value === '' ? '' : parseFloat(inputs[1].value);
    protocol[i].durationSec = inputs[2].value === '' ? '' : parseFloat(inputs[2].value);
    protocol[i].slot        = inputs[3].value;
  });
}

// ─────────────────────────────────────────────────────────────
// Drag-and-drop reorder
// Each .proto-row is made draggable; its data-index attribute tracks
// its current position. Event handlers are re-wired on every
// renderProtoTable() call (rows are fully rebuilt each time).
// ─────────────────────────────────────────────────────────────

/** Record the source row index and apply a dragging style on drag start. */
function onDragStart(e) {
  dragSrcIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
/** Allow a drop on this row by preventing default; highlight it with .drag-over. */
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
/** Remove the .drag-over highlight when the dragged item leaves this row. */
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
/** Handle a drop: sync DOM → protocol[], splice the moved step, re-render. */
function onDrop(e) {
  e.preventDefault();
  const destIndex = parseInt(e.currentTarget.dataset.index);
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcIndex === null || dragSrcIndex === destIndex) return;
  syncProtocolFromDOM();
  const [moved] = protocol.splice(dragSrcIndex, 1);
  protocol.splice(destIndex, 0, moved);
  dragSrcIndex = null;
  renderProtoTable();
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.proto-row').forEach(r => r.classList.remove('drag-over'));
  dragSrcIndex = null;
}

// ─────────────────────────────────────────────────────────────
// Panel 1 — Protocol editor
// ─────────────────────────────────────────────────────────────

/**
 * Rebuild the entire <tbody> of the protocol table from the protocol[].
 * Wires drag-and-drop handlers and validation highlight classes on each row.
 * Called after every structural change (add, delete, move, import).
 */
function renderProtoTable() {
  const tbody = document.getElementById('proto-body');
  tbody.innerHTML = '';
  protocol.forEach((step, i) => {
    const tr = document.createElement('tr');
    tr.className = 'proto-row';
    tr.draggable = true;
    tr.dataset.index = i;
    tr.addEventListener('dragstart', onDragStart);
    tr.addEventListener('dragover',  onDragOver);
    tr.addEventListener('dragleave', onDragLeave);
    tr.addEventListener('drop',      onDrop);
    tr.addEventListener('dragend',   onDragEnd);
    tr.innerHTML = `
      <td class="col-drag"><span class="drag-handle" title="Drag to reorder">⠿</span></td>
      <td class="col-num">${i + 1}</td>
      <td class="col-sol">
        <input type="text" placeholder="Solution name" value="${escHtml(step.solution)}"
          oninput="updateStep(${i},'solution',this.value)" />
      </td>
      <td class="col-dur">
        <div class="dur-wrap">
          <input type="number" min="0" step="1" placeholder="min"
            value="${step.durationMin !== '' ? step.durationMin : ''}"
            oninput="updateStep(${i},'durationMin',this.value)" />
          <span>min</span>
          <input type="number" min="0" max="59.999" step="0.1" placeholder="sec"
            value="${step.durationSec !== '' ? step.durationSec : ''}"
            oninput="updateStep(${i},'durationSec',this.value)" />
          <span>sec</span>
        </div>
      </td>
      <td class="col-slot">
        <input type="number" min="1" step="1" placeholder="—"
          value="${step.slot !== '' ? step.slot : ''}"
          oninput="updateStep(${i},'slot',this.value)" />
      </td>
      <td class="col-acts">
        <div class="acts-cell">
          <button class="act-btn" title="Move up"   onclick="moveStep(${i},-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
          <button class="act-btn" title="Move down"  onclick="moveStep(${i},+1)" ${i === protocol.length-1 ? 'disabled' : ''}>↓</button>
          <button class="act-btn del" title="Delete" onclick="deleteStep(${i})">🗑</button>
        </div>
      </td>`;
    tbody.appendChild(tr);

    if (validationWarnings.solution.has(i))
      tr.querySelector('.col-sol input').classList.add('warning');
    if (validationWarnings.slot.has(i))
      tr.querySelector('.col-slot input').classList.add('warning');
  });
}

/**
 * Update a single field in protocol[i] from an oninput event.
 * Clears any validation warnings and optionally auto-fills the slot
 * when the solution name matches another step.
 *
 * @param {number} i      Step index (0-based)
 * @param {string} field  Field name: 'solution' | 'durationMin' | 'durationSec' | 'slot'
 * @param {string} val    Raw string value from the input element
 */
function updateStep(i, field, val) {
  if (field === 'durationMin' || field === 'durationSec') {
    protocol[i][field] = val === '' ? '' : parseFloat(val);
  } else if (field === 'slot') {
    protocol[i][field] = val;
  } else {
    protocol[i][field] = val;
  }
  clearValidationWarnings();
  document.getElementById('validation-msg').textContent = '';
  if (field === 'solution') tryAutoFillSlot(i);
}

/**
 * If the slot for step i is empty and another step with the same solution
 * name already has a slot, copy that slot to step i automatically.
 * Provides a convenience shortcut for repeated-solution protocols.
 *
 * @param {number} i  Step index to potentially auto-fill
 */
function tryAutoFillSlot(i) {
  if (protocol[i].slot !== '') return;
  const name = protocol[i].solution.trim().toLowerCase();
  if (!name) return;
  for (let j = 0; j < protocol.length; j++) {
    if (j === i) continue;
    if (protocol[j].solution.trim().toLowerCase() === name && protocol[j].slot !== '') {
      protocol[i].slot = protocol[j].slot;
      const rows = document.querySelectorAll('.proto-row');
      if (rows[i]) rows[i].querySelector('.col-slot input').value = protocol[j].slot;
      return;
    }
  }
}

/**
 * Append a blank step to the protocol and focus its solution input.
 */
function addStep() {
  protocol.push({ solution: '', durationMin: '', durationSec: '', slot: '' });
  renderProtoTable();
  // Focus the new solution input
  const rows = document.querySelectorAll('.proto-row');
  const lastRow = rows[rows.length - 1];
  if (lastRow) lastRow.querySelector('input[type="text"]').focus();
}

/**
 * Remove step at index i. Refuses to remove the last remaining step.
 * Re-renders and re-checks for slot conflicts after deletion.
 *
 * @param {number} i  Step index to remove
 */
function deleteStep(i) {
  if (protocol.length <= 1) return;
  protocol.splice(i, 1);
  const conflictSlot = collectSlotConflictWarnings();
  renderProtoTable();
  document.getElementById('validation-msg').textContent =
    conflictSlot !== null
      ? `Slot ${conflictSlot} is assigned to multiple solutions. Each slot can only contain one solution name.`
      : '';
}

/**
 * Discard the entire protocol after a user confirmation prompt.
 * Resets to a single blank step and focuses its solution input.
 */
function clearProtocol() {
  if (!confirm('Clear all steps and start over?')) return;
  protocol = [{ solution: '', durationMin: '', durationSec: '', slot: '' }];
  clearValidationWarnings();
  document.getElementById('validation-msg').textContent = '';
  renderProtoTable();
  const firstRow = document.querySelector('.proto-row');
  if (firstRow) firstRow.querySelector('input[type="text"]').focus();
}

/**
 * Move a step one position up (dir = -1) or down (dir = +1).
 * No-op if the move would go out of bounds.
 *
 * @param {number} i   Step index to move
 * @param {number} dir -1 (up) or +1 (down)
 */
function moveStep(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= protocol.length) return;
  [protocol[i], protocol[j]] = [protocol[j], protocol[i]];
  const conflictSlot = collectSlotConflictWarnings();
  renderProtoTable();
  document.getElementById('validation-msg').textContent =
    conflictSlot !== null
      ? `Slot ${conflictSlot} is assigned to multiple solutions. Each slot can only contain one solution name.`
      : '';
}

/**
 * Validate the current protocol[] for common errors:
 * - Missing solution name
 * - Invalid minutes (must be non-negative integer)
 * - Invalid seconds (must be in [0, 60))
 * - Zero total duration
 * - Non-integer slot numbers
 * - Slot conflicts (same slot, different solution names)
 *
 * @returns {string|null} Error message, or null if the protocol is valid.
 */
function validateProtocol() {
  clearValidationWarnings();
  for (let i = 0; i < protocol.length; i++) {
    if (!protocol[i].solution.trim()) {
      return `Step ${i + 1}: solution name is required.`;
    }
    const slotRaw = String(protocol[i].slot || '').trim();
    const min = parseFloat(protocol[i].durationMin);
    const sec = parseFloat(protocol[i].durationSec);
    if (isNaN(min) || min < 0 || !Number.isInteger(min)) {
      return `Step ${i + 1}: minutes must be a non-negative integer.`;
    }
    if (isNaN(sec) || sec < 0 || sec >= 60) {
      return `Step ${i + 1}: seconds must be at least 0 and less than 60.`;
    }
    if (getStepDurationMs(protocol[i]) <= 0) {
      return `Step ${i + 1}: duration must be greater than 0 seconds.`;
    }
    if (slotRaw) {
      const slotNum = parseSlotNumber(slotRaw);
      if (slotNum === null) {
        return `Step ${i + 1}: slot must be a positive integer.`;
      }
    }
  }
  if (protocol.length === 0) return 'Add at least one step.';

  const firstConflictSlot = collectSlotConflictWarnings();
  if (firstConflictSlot !== null) {
    applyValidationWarnings();
    return `Slot ${firstConflictSlot} is assigned to multiple solutions. Each slot can only contain one solution name.`;
  }

  return null;
}

/**
 * Detect slot conflicts: a slot that is assigned to more than one
 * distinct solution name. Populates validationWarnings with the
 * row indices involved.
 *
 * @returns {number|null} The first conflicting slot number, or null.
 */
function collectSlotConflictWarnings() {
  clearValidationWarnings();
  const slotSolutions = new Map();

  for (let i = 0; i < protocol.length; i++) {
    const solution = String(protocol[i].solution || '').trim();
    const slotRaw = String(protocol[i].slot || '').trim();
    if (!solution || !slotRaw) continue;

    const slotNum = parseSlotNumber(slotRaw);
    if (slotNum === null) continue;

    const solutionKey = solution.toLowerCase();
    const seen = slotSolutions.get(slotNum);
    if (!seen) {
      slotSolutions.set(slotNum, new Map([[solutionKey, [i]]]));
      continue;
    }

    const rows = seen.get(solutionKey);
    if (rows) rows.push(i);
    else seen.set(solutionKey, [i]);
  }

  let firstConflictSlot = null;
  slotSolutions.forEach((solutionsByName, slotNum) => {
    if (solutionsByName.size <= 1) return;
    if (firstConflictSlot === null) firstConflictSlot = slotNum;
    solutionsByName.forEach(rows => {
      rows.forEach(rowIdx => {
        validationWarnings.solution.add(rowIdx);
        validationWarnings.slot.add(rowIdx);
      });
    });
  });

  return firstConflictSlot;
}

/** Clear validationWarnings sets and remove the .warning class from all protocol inputs. */
function clearValidationWarnings() {
  validationWarnings.solution.clear();
  validationWarnings.slot.clear();
  document.querySelectorAll('.proto-row input.warning').forEach(el => el.classList.remove('warning'));
}

/** Add .warning to inputs whose index appears in validationWarnings.solution or .slot. */
function applyValidationWarnings() {
  document.querySelectorAll('.proto-row').forEach((tr, i) => {
    if (validationWarnings.solution.has(i))
      tr.querySelector('.col-sol input').classList.add('warning');
    if (validationWarnings.slot.has(i))
      tr.querySelector('.col-slot input').classList.add('warning');
  });
}

/**
 * Validate the protocol, then transition to Panel 2 (run timer).
 * Initialises stepResults[] and resets all timer state to idle.
 */
function goToRun() {
  syncProtocolFromDOM();

  const err = validateProtocol();
  if (err) {
    document.getElementById('validation-msg').textContent = err;
    return;
  }

  // Reset timer state
  currentStep  = 0;
  timerState   = 'idle';
  stepEndTime  = null;
  pausedRemaining = null;
  stepResults  = protocol.map(s => ({
    solution: s.solution, durationMin: s.durationMin, durationSec: s.durationSec, slot: s.slot,
    startedAt: null, actualMs: null
  }));
  clearInterval(tickInterval);

  renderRunPanel();
  showPanel('run');
}

/**
 * Return to Panel 1 (protocol editor) from Panel 2.
 * Stops the running timer and resets the tab title.
 */
function goToSetup() {
  clearInterval(tickInterval);
  timerState = 'idle';
  document.title = 'Stain Timer · LabTools';
  showPanel('setup', true);
}

// ─────────────────────────────────────────────────────────────
// Panel navigation
// ─────────────────────────────────────────────────────────────

/**
 * Show a named panel and update the step-bar pip states.
 * Adds .slide-back for backward animations (right-to-left slide).
 *
 * @param {'setup'|'run'} name  Panel to show
 * @param {boolean} [back]     True when navigating backward (←)
 */
function showPanel(name, back) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('panel-' + name);
  if (back) target.classList.add('slide-back');
  else      target.classList.remove('slide-back');
  target.classList.add('active');

  const pip1 = document.getElementById('pip1');
  const pip2 = document.getElementById('pip2');
  const conn = document.getElementById('conn1');

  if (name === 'setup') {
    pip1.className = 'step-pip active';
    pip2.className = 'step-pip';
    conn.className = 'step-connector';
  } else {
    pip1.className = 'step-pip done';
    pip2.className = 'step-pip active';
    conn.className = 'step-connector done';
  }
}

// ─────────────────────────────────────────────────────────────
// Timer core
// ─────────────────────────────────────────────────────────────

/**
 * Toggle between start, pause, and resume based on the current timerState.
 * Delegates to startStep(), pauseTimer(), or resumeTimer().
 */
function toggleStartPause() {
  if (timerState === 'idle' || timerState === 'step_complete') {
    startStep();
  } else if (timerState === 'running') {
    pauseTimer();
  } else if (timerState === 'paused') {
    resumeTimer();
  }
}

/**
 * Begin (or resume) the current step's countdown.
 * Computes the absolute end timestamp from remaining ms, records the
 * wall-clock start time in stepResults[], and starts the tick interval.
 */
function startStep() {
  ensureAudio();
  const durationMs = getStepDurationMs(protocol[currentStep]);
  const remaining = pausedRemaining !== null ? pausedRemaining : durationMs;
  pausedRemaining = null;
  stepEndTime = Date.now() + remaining;
  stepStartTs = stepResults[currentStep].startedAt
    ? stepStartTs   // keep original start if resuming
    : Date.now();
  if (!stepResults[currentStep].startedAt) {
    stepResults[currentStep].startedAt = formatWallClock(stepStartTs);
  }
  timerState = 'running';
  updateControls();
  startTick();
}

/**
 * Pause the running timer. Captures remaining ms so resumeTimer()
 * can continue from exactly where it stopped.
 */
function pauseTimer() {
  clearInterval(tickInterval);
  pausedRemaining = Math.max(0, stepEndTime - Date.now());
  timerState = 'paused';
  updateControls();
  document.title = 'Paused — Stain Timer · LabTools';
}

/** Resume a paused timer by re-entering startStep() with the saved pausedRemaining. */
function resumeTimer() {
  startStep();
}

/**
 * Skip the current step immediately (records actualMs = 0) and
 * advance to the next step or completion state.
 */
function skipStep() {
  clearInterval(tickInterval);
  stepResults[currentStep].actualMs = 0;
  if (!stepResults[currentStep].startedAt) {
    stepResults[currentStep].startedAt = formatWallClock(Date.now());
  }
  advanceStep();
}

/**
 * Reset the run panel to its initial state (Step 1, idle).
 * Clears all timing state, stepResults[], and the done banner.
 */
function resetTimer() {
  clearInterval(tickInterval);
  currentStep = 0;
  timerState = 'idle';
  stepEndTime = null;
  pausedRemaining = null;
  stepStartTs = null;
  stepResults = protocol.map(s => ({
    solution: s.solution, durationMin: s.durationMin, durationSec: s.durationSec, slot: s.slot,
    startedAt: null, actualMs: null
  }));
  document.getElementById('current-block').className = 'current-step-block';
  document.getElementById('done-banner').style.display = 'none';
  document.getElementById('btn-export-results').disabled = true;
  document.title = 'Stain Timer · LabTools';
  renderRunPanel();
}

/**
 * Start the 100 ms tick interval.
 * Each tick redraws the countdown and advances the step when time reaches 0.
 * Using 100 ms (not 1000 ms) keeps the display smooth and responsive.
 */
function startTick() {
  clearInterval(tickInterval);
  tickInterval = setInterval(() => {
    const remaining = Math.max(0, stepEndTime - Date.now());
    renderCountdown(remaining);
    updateTabTitle(remaining);
    if (remaining === 0) {
      clearInterval(tickInterval);
      stepResults[currentStep].actualMs = Date.now() - stepStartTs;
      playAlarm();
      advanceStep();
    }
  }, 100);
}

/**
 * Move to the next step after the current one completes or is skipped.
 * If this was the last step, calls onAllDone() instead.
 */
function advanceStep() {
  pausedRemaining = null;
  stepStartTs = null;

  if (currentStep < protocol.length - 1) {
    currentStep++;
    timerState = 'idle';
    updateControls();
    renderRunPanel();
    // Auto-scroll current step into view
    const rows = document.querySelectorAll('.sl-row');
    if (rows[currentStep]) rows[currentStep].scrollIntoView({ block: 'nearest' });
  } else {
    // All done
    timerState = 'done';
    onAllDone();
  }
}

/** Handle protocol completion: reveal done-banner, show total time, freeze controls, update tab title. */
function onAllDone() {
  document.getElementById('current-block').classList.add('done-state');
  document.getElementById('countdown').textContent = '✓';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('done-banner').style.display = 'block';
  document.getElementById('btn-export-results').disabled = false;

  const total = stepResults.reduce((s, r) => s + (r.actualMs || 0), 0);
  document.getElementById('done-sub').textContent =
    `Total time: ${formatDuration(total)}`;

  document.title = '✓ Done — Stain Timer · LabTools';
  updateControls();
  renderStepsList();
}

// ─────────────────────────────────────────────────────────────
// Render helpers (Panel 2)
// ─────────────────────────────────────────────────────────────

/**
 * Re-draw the entire run panel to reflect the current step.
 * Called when advancing a step, resetting, or arriving from Panel 1.
 */
function renderRunPanel() {
  const step = protocol[currentStep];
  const slotNum = parseSlotNumber(step.slot);

  document.getElementById('step-counter').textContent =
    `Step ${currentStep + 1} of ${protocol.length}`;
  document.getElementById('step-slot-label').textContent =
    slotNum !== null ? `Slot ${slotNum}` : 'No slot assigned';
  document.getElementById('step-solution').textContent = step.solution;

  const durationMs = getStepDurationMs(step);
  renderCountdown(pausedRemaining !== null ? pausedRemaining : durationMs);
  document.getElementById('progress-fill').style.width =
    pausedRemaining !== null
      ? ((1 - pausedRemaining / durationMs) * 100).toFixed(1) + '%'
      : '0%';

  renderSlotRack();
  renderNextStrip();
  renderStepsList();
  updateControls();
}

/**
 * Update the countdown display (MM:SS) and progress bar width
 * from the given remaining milliseconds.
 *
 * @param {number} remainingMs  Milliseconds left in the current step
 */
function renderCountdown(remainingMs) {
  const totalSec = Math.ceil(remainingMs / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  document.getElementById('countdown').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

  const durationMs = getStepDurationMs(protocol[currentStep]);
  const pct = durationMs > 0 ? ((1 - remainingMs / durationMs) * 100) : 100;
  document.getElementById('progress-fill').style.width = Math.min(100, pct).toFixed(1) + '%';
}

/** Update the #next-strip preview bar with the next step's solution, slot, and duration. */
function renderNextStrip() {
  const strip = document.getElementById('next-strip');
  if (timerState === 'done' || currentStep >= protocol.length - 1) {
    strip.textContent = 'Last step.';
    return;
  }
  const next = protocol[currentStep + 1];
  const nextSlot = parseSlotNumber(next.slot);
  const slotPart = nextSlot !== null ? ` · Slot ${nextSlot}` : ' · No slot assigned';
  strip.innerHTML = `<strong>Next:</strong> Step ${currentStep + 2}${slotPart} · ${escHtml(next.solution)} · ${formatStepDurationText(next)}`;
}

/**
 * Rebuild the scrollable all-steps list (.steps-list) below the controls.
 * Marks each row as sl-done, sl-current, or sl-upcoming based on
 * the currentStep index and timerState.
 */
function renderStepsList() {
  const list = document.getElementById('steps-list');
  list.innerHTML = '';
  protocol.forEach((step, i) => {
    const div = document.createElement('div');
    const isDone    = i < currentStep || timerState === 'done';
    const isCurrent = i === currentStep && timerState !== 'done';
    div.className = 'sl-row ' + (isDone ? 'sl-done' : isCurrent ? 'sl-current' : 'sl-upcoming');

    const icon = isDone ? '✓' : isCurrent ? '→' : '';
    const slotNum = parseSlotNumber(step.slot);
    const slotStr = slotNum !== null ? `Slot ${slotNum}` : 'No slot';
    const durStr = isCurrent && timerState === 'running'
      ? document.getElementById('countdown').textContent + ' left'
      : formatStepDurationText(step);

    div.innerHTML = `
      <span class="sl-icon">${icon}</span>
      <span class="sl-num">${i + 1}</span>
      <span class="sl-sol">${escHtml(step.solution)}</span>
      <span class="sl-dur">${durStr}</span>
      <span class="sl-slot">${slotStr}</span>`;
    list.appendChild(div);
  });
}

/**
 * Render the slot rack (visual slide-position indicator).
 * Shows a row of numbered slot boxes; the currently active slot is
 * highlighted. Hides the rack entirely when no slots are assigned.
 */
function renderSlotRack() {
  const rack = document.getElementById('slot-rack');
  const status = document.getElementById('slot-rack-status');
  const row = document.getElementById('slot-rack-row');
  const current = protocol[currentStep];
  const currentSlot = parseSlotNumber(current.slot);
  const maxSlot = getMaxAssignedSlot();

  if (maxSlot === null) {
    rack.hidden = true;
    status.textContent = '';
    status.className = 'slot-rack-status';
    row.innerHTML = '';
    return;
  }

  rack.hidden = false;
  row.innerHTML = '';

  for (let slot = 1; slot <= maxSlot; slot++) {
    const box = document.createElement('div');
    box.className = 'slot-box' + (slot === currentSlot ? ' active' : '');
    box.textContent = String(slot);
    box.setAttribute('aria-label', `Slot ${slot}`);
    row.appendChild(box);
  }

  if (currentSlot !== null) {
    status.className = 'slot-rack-status';
    status.textContent = `Slides are currently in ${current.solution}, slot ${currentSlot}.`;
  } else {
    status.className = 'slot-rack-status unassigned';
    status.textContent = `Slides are in ${current.solution}, but no slot is assigned for this step.`;
  }
}

/** Sync the Start/Pause/Resume, Skip, and Reset button labels and disabled states to timerState. */
function updateControls() {
  const btnStart = document.getElementById('btn-start');
  const btnSkip  = document.getElementById('btn-skip');
  const btnReset = document.getElementById('btn-reset-timer');

  if (timerState === 'done') {
    btnStart.textContent = '▶ Start';
    btnStart.disabled    = true;
    btnStart.className   = 'btn-start';
    btnSkip.disabled     = true;
    btnReset.disabled    = false;
    return;
  }
  if (timerState === 'running') {
    btnStart.textContent = '⏸ Pause';
    btnStart.disabled    = false;
    btnStart.className   = 'btn-start';
    btnSkip.disabled     = false;
  } else if (timerState === 'paused') {
    btnStart.textContent = '▶ Resume';
    btnStart.disabled    = false;
    btnStart.className   = 'btn-start paused';
    btnSkip.disabled     = false;
  } else {
    btnStart.textContent = '▶ Start';
    btnStart.disabled    = false;
    btnStart.className   = 'btn-start';
    btnSkip.disabled     = true;
  }
  btnReset.disabled = false;
}

/** Set the browser tab title to the current countdown and solution name (e.g. "02:30 — PBS | Stain Timer"). */
function updateTabTitle(remainingMs) {
  const totalSec = Math.ceil(remainingMs / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  const ts = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  const sol = protocol[currentStep].solution;
  document.title = `${ts} — ${sol} | Stain Timer`;
}

// ─────────────────────────────────────────────────────────────
// Audio
// ─────────────────────────────────────────────────────────────

/**
 * Lazily initialise the Web Audio API context.
 * Must be called from a user-gesture handler (startStep) because browsers
 * block AudioContext creation before any user interaction.
 */
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new AudioContext(); } catch(e) { audioCtx = null; }
  }
}

/**
 * Play a three-beep alarm using the Web Audio API.
 * Three 880 Hz oscillator pulses are scheduled at 0, 0.42, and 0.84 s.
 * Each pulse fades out with an exponential ramp to prevent clicks.
 * No-op when the alarm toggle is off or when audioCtx is unavailable.
 */
function playAlarm() {
  if (!document.getElementById('alarm-toggle').checked) return;
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  [0, 0.42, 0.84].forEach(t => {
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.28, audioCtx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.38);
      osc.start(audioCtx.currentTime + t);
      osc.stop(audioCtx.currentTime + t + 0.4);
    } catch(e) { /* ignore if context is closed */ }
  });
}

// ─────────────────────────────────────────────────────────────
// Import / Export
// ─────────────────────────────────────────────────────────────

/**
 * Export the current protocol as a CSV file (stain-protocol.csv).
 * Columns: Step, Solution, Duration Min, Duration Sec, Slot.
 */
function exportProtocol() {
  syncProtocolFromDOM();

  const header = 'Step,Solution,Duration Min,Duration Sec,Slot';
  const lines = protocol.map((s, i) =>
    [i + 1, csvCell(s.solution), s.durationMin, s.durationSec, s.slot].join(',')
  );
  downloadCsv([header, ...lines].join('\n'), 'stain-protocol.csv');
}

/**
 * Read an uploaded CSV file and replace the current protocol.
 * Delegates parsing to parseProtocolCsv(); displays any error in
 * validation-msg. Resets the file input so the same file can be
 * re-imported if the user makes corrections.
 *
 * @param {Event} evt  Change event from the hidden file input
 */
function importProtocol(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const parsed = parseProtocolCsv(text);
    if (parsed.error) {
      document.getElementById('validation-msg').textContent = parsed.error;
      return;
    }
    protocol = parsed.steps;
    renderProtoTable();
    document.getElementById('validation-msg').textContent = '';
  };
  reader.readAsText(file);
  evt.target.value = '';
}

/**
 * Parse CSV text into protocol steps. Expects the export format:
 * Step, Solution, Duration Min, Duration Sec, Slot (header row required).
 *
 * @param {string} text  Raw CSV content
 * @returns {{ steps: Object[] } | { error: string }}
 */
function parseProtocolCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { error: 'CSV must have a header row and at least one step.' };
  const steps = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCsvLine(lines[i]);
    if (cols.length < 4) return { error: `Row ${i + 1}: expected at least 4 columns.` };
    const solution = cols[1] ? cols[1].trim() : '';
    const durationMin = parseFloat(cols[2]);
    const durationSec = parseFloat(cols[3]);
    const slot        = cols[4] ? cols[4].trim() : '';
    if (!solution) return { error: `Row ${i + 1}: solution name is empty.` };
    if (isNaN(durationMin) || durationMin < 0 || !Number.isInteger(durationMin))
      return { error: `Row ${i + 1}: invalid duration minutes.` };
    if (isNaN(durationSec) || durationSec < 0 || durationSec >= 60)
      return { error: `Row ${i + 1}: invalid duration seconds.` };
    const step = { solution, durationMin, durationSec, slot };
    if (getStepDurationMs(step) <= 0) return { error: `Row ${i + 1}: invalid duration.` };
    steps.push(step);
  }
  return { steps };
}

/**
 * Export per-step timing results after the protocol completes.
 * Columns: Step, Solution, Duration Min, Duration Sec, Slot,
 *          Started At, Actual Duration (min).
 */
function exportResults() {
  const header = 'Step,Solution,Duration Min,Duration Sec,Slot,Started At,Actual Duration (min)';
  const lines = stepResults.map((r, i) => {
    const actual = r.actualMs !== null ? (r.actualMs / 60000).toFixed(2) : '';
    return [i + 1, csvCell(r.solution), r.durationMin, r.durationSec, r.slot, r.startedAt || '', actual].join(',');
  });
  downloadCsv([header, ...lines].join('\n'), 'stain-results.csv');
}

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────

/** Escape a string for safe insertion into HTML (prevents XSS in innerHTML). */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** Wrap a value in an RFC-4180 double-quoted CSV cell, escaping any internal double-quotes. */
function csvCell(val) {
  const s = String(val).replace(/"/g, '""');
  return `"${s}"`;
}

/**
 * Parse one RFC-4180 CSV line into an array of field strings.
 * Handles quoted fields, escaped quotes (""), and unquoted fields.
 *
 * @param {string} line  A single CSV line (no trailing newline)
 * @returns {string[]}
 */
function splitCsvLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

/**
 * Create a CSV Blob and trigger a browser file download.
 *
 * @param {string} content   CSV string content
 * @param {string} filename  Suggested download filename
 */
function downloadCsv(content, filename) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/** Format a Unix timestamp (ms) as an HH:MM:SS wall-clock string. */
function formatWallClock(ts) {
  const d = new Date(ts);
  return d.toTimeString().slice(0, 8);
}

/** Format milliseconds as a compact human-readable string (e.g. "2m 5s" or "45s"). */
function formatDuration(ms) {
  const totalSec = Math.round(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

/**
 * Convert a step's duration fields (min + sec) to milliseconds.
 *
 * @param {{ durationMin: number|string, durationSec: number|string }} step
 * @returns {number} Duration in ms, or NaN if either field is invalid
 */
function getStepDurationMs(step) {
  const min = Number(step.durationMin);
  const sec = Number(step.durationSec);
  if (isNaN(min) || isNaN(sec)) return NaN;
  return (min * 60 + sec) * 1000;
}

/** Format a step's durationMin + durationSec fields as a readable string (e.g. "1 min 30 sec"). */
function formatStepDurationText(step) {
  const min = Number(step.durationMin);
  const sec = Number(step.durationSec);
  if (isNaN(min) || isNaN(sec)) return '—';
  const hasFraction = !Number.isInteger(sec);
  const secText = hasFraction ? sec.toFixed(1).replace(/\.0$/, '') : String(sec);
  if (min === 0) return `${secText} sec`;
  if (sec === 0) return `${min} min`;
  return `${min} min ${secText} sec`;
}

/**
 * Parse a slot field value into a positive integer.
 * Returns null for empty, non-numeric, fractional, or non-positive values.
 *
 * @param {string|number|null|undefined} slot
 * @returns {number|null}
 */
function parseSlotNumber(slot) {
  if (slot === null || slot === undefined) return null;
  const raw = String(slot).trim();
  if (!/^\d+$/.test(raw)) return null;
  const parsed = Number(raw);
  return Number.isInteger(parsed) && parsed > 0 ? parsed : null;
}

/** Return the highest slot number assigned across all protocol steps, or null if none are set. */
function getMaxAssignedSlot() {
  let max = null;
  protocol.forEach(step => {
    const slotNum = parseSlotNumber(step.slot);
    if (slotNum !== null) max = max === null ? slotNum : Math.max(max, slotNum);
  });
  return max;
}

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
renderProtoTable();
</script>
