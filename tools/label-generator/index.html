<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Label Generator · LabTools</title>
  <link rel="stylesheet" href="../../assets/css/labtools.css"/>
  <script src="../../assets/js/labtools-common.js"></script>
  <script src="../thermal-to-laser/preset-config.js"></script>
  <script src="./preset-config.js"></script>
  <script src="./bwip-js-min.js"></script>
  <script src="./pdf-lib.min.js"></script>
  <style>
    /* ── Token aliases: design uses --amber-* & --border-strong ── */
    :root {
      --amber:        var(--yellow);
      --amber-dark:   var(--yellow-dark);
      --amber-bg:     var(--yellow-bg);
      --amber-border: var(--yellow-border);
      --border-strong: #d4d3cf;
      --surface-cool:  #f5f7fa;
    }

    /* ── Page chrome resets ─────────────────────────────────────── */
    body { overflow: hidden; }
    @media (max-width: 820px) { body { overflow: auto; } }

    /* ─── Top nav (extends shared .lt-nav) ────────────────────── */
    .lg-nav-spacer { flex: 1; }
    .lg-nav-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.76rem; padding: 5px 10px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 999px; color: var(--text-muted);
    }
    .lg-nav-pill b { color: var(--text); font-weight: 700; }
    .lg-nav-pill svg { width: 12px; height: 12px; }
    .lg-nav-action {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--text); color: #fff;
      border: 1px solid var(--text);
      border-radius: var(--radius-md);
      padding: 6px 12px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.12s;
    }
    .lg-nav-action:hover { opacity: 0.88; }
    .lg-nav-action svg { width: 12px; height: 12px; }

    /* ─── Main workspace: 3-column grid ──────────────────────── */
    .lg-workspace {
      display: grid;
      grid-template-columns: 296px minmax(0, 1fr) 340px;
      height: calc(100vh - 52px - 64px);
      min-height: 600px;
    }

    /* ─── Rails ───────────────────────────────────────────────── */
    .lg-rail {
      background: var(--surface);
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .lg-rail-right { border-right: none; border-left: 1px solid var(--border-subtle); }
    .lg-rail-section {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .lg-rail-section:last-child { border-bottom: none; }

    .lg-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .lg-section-title {
      font-size: 0.71rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .lg-section-aux {
      font-size: 0.72rem; color: var(--text-dim);
      font-family: var(--font-mono);
      background: var(--surface-subtle);
      padding: 2px 7px; border-radius: 999px;
    }

    /* ─── CSV loaded card ─────────────────────────────────────── */
    .lg-csv-loaded {
      border: 1px solid var(--green-border);
      background: var(--green-bg);
      border-radius: var(--radius-md);
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .lg-csv-loaded-head {
      display: flex; align-items: center; gap: 8px;
    }
    .lg-csv-loaded-icon {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--green);
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0;
    }
    .lg-csv-loaded-icon svg { width: 14px; height: 14px; }
    .lg-csv-loaded-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .lg-csv-loaded-meta { font-size: 0.71rem; font-family: var(--font-mono); color: var(--text-muted); }
    .lg-csv-cols { display: flex; flex-wrap: wrap; gap: 4px; }
    .lg-csv-col {
      display: inline-flex;
      padding: 2px 7px; border-radius: var(--radius-xs);
      color: var(--green-dark); font-size: 0.70rem;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(75,157,82,0.25);
    }
    .lg-csv-col.more { background: var(--surface); color: var(--text-muted); }
    .lg-csv-actions { display: flex; gap: 10px; align-items: center; }
    .lg-link-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.74rem; color: var(--text-muted);
      background: none; border: none; cursor: pointer; padding: 0;
      font-family: inherit;
    }
    .lg-link-btn:hover { color: var(--text); }
    .lg-link-btn.danger:hover { color: var(--red); }
    .lg-link-btn svg { width: 11px; height: 11px; }

    /* ─── CSV empty state / drop zone ─────────────────────────── */
    .lg-csv-empty {
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius-md);
      padding: 20px 14px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .lg-csv-empty:hover, .lg-csv-empty.drag-over {
      border-color: var(--blue); background: var(--blue-bg);
    }
    .lg-csv-empty .ico { color: var(--text-dim); margin-bottom: 6px; }
    .lg-csv-empty .ico svg { width: 22px; height: 22px; }
    .lg-csv-empty h4 { font-size: 0.84rem; color: var(--text-secondary); margin-bottom: 2px; }
    .lg-csv-empty p  { font-size: 0.72rem; color: var(--text-muted); }
    .lg-csv-empty .alt { font-size: 0.70rem; color: var(--text-dim); margin-top: 4px; }

    /* ─── Paste details ───────────────────────────────────────── */
    .lg-paste-details { margin-top: 10px; }
    .lg-paste-details > summary {
      font-size: 0.74rem; color: var(--text-muted);
      cursor: pointer; padding: 4px 0;
      list-style: none; position: relative;
      padding-left: 16px; user-select: none;
    }
    .lg-paste-details > summary::before {
      content: '▸'; position: absolute; left: 2px;
      transition: transform 0.15s; color: var(--text-dim);
    }
    .lg-paste-details[open] > summary::before { transform: rotate(90deg); }
    .lg-paste-area {
      width: 100%; min-height: 88px;
      font-size: 0.72rem; font-family: var(--font-mono);
      resize: vertical; margin-top: 6px;
    }
    .lg-parse-opts {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      margin-top: 8px; align-items: center;
    }

    /* ─── Segmented controls use shared .lt-segmented / .lt-segmented-btn ── */
    .lt-segmented-btn svg { width: 13px; height: 13px; }
    .lg-select {
      width: 100%; padding: 6px 8px;
      border: 1px solid var(--border); border-radius: var(--radius-md);
      background: var(--surface); font-size: 0.82rem; color: var(--text);
      font-family: inherit; cursor: pointer;
    }
    .lg-field-label {
      display: block; font-size: 0.72rem; color: var(--text-muted);
      margin-bottom: 4px; font-weight: 500;
    }

    /* ─── Key-value geometry table ────────────────────────────── */
    .lg-kv {
      display: grid; grid-template-columns: 1fr auto;
      column-gap: 16px; row-gap: 3px;
      margin-top: 10px;
    }
    .lg-kv dt { font-size: 0.72rem; color: var(--text-muted); align-self: center; }
    .lg-kv dd {
      font-size: 0.72rem; font-family: var(--font-mono);
      color: var(--text-secondary); text-align: right; align-self: center;
    }

    /* ─── Checkbox ────────────────────────────────────────────── */
    .lg-checkbox {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--text-secondary);
      cursor: pointer; margin-top: 10px;
    }
    .lg-checkbox input[type="checkbox"] { cursor: pointer; }

    /* ─── Custom preset form ─────────────────────────────────── */
    .lg-custom-form {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--surface-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      display: grid; grid-template-columns: 1fr auto;
      column-gap: 16px; row-gap: 5px; align-items: center;
    }
    .lg-custom-form label {
      font-size: 0.72rem; color: var(--text-muted);
    }
    .lg-custom-form input[type="number"] {
      width: 72px; padding: 3px 6px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.78rem; font-family: var(--font-mono);
      color: var(--text); background: var(--surface);
      text-align: right;
    }
    .lg-custom-form input[type="number"]:focus { outline: 2px solid var(--blue); border-color: transparent; }

    /* ─── Template action links ───────────────────────────────── */
    .lg-tmpl-actions {
      display: flex; gap: 10px; padding: 10px 18px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .lg-tmpl-actions .lg-link-btn { font-size: 0.73rem; }

    /* ─── Center workspace ────────────────────────────────────── */
    .lg-center {
      display: flex; flex-direction: column;
      background:
        radial-gradient(ellipse at 50% -8%, rgba(92,141,255,0.05), transparent 50%),
        linear-gradient(180deg, var(--surface-cool) 0%, #f1f3f6 100%);
      overflow-y: auto;
    }
    .lg-canvas-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      gap: 14px; flex-shrink: 0;
    }
    .lg-canvas-head-l { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .lg-canvas-title  { font-size: 0.94rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .lg-canvas-emoji  { font-size: 1.05rem; }
    .lg-canvas-dim {
      font-family: var(--font-mono); font-size: 0.76rem; color: var(--text-secondary);
      padding: 3px 9px; background: var(--surface);
      border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
    }
    .lg-canvas-dim.subtle { color: var(--text-muted); background: transparent; border-color: transparent; padding-left: 0; }
    .lg-canvas-hint { font-size: 0.74rem; color: var(--text-muted); }

    /* ─── Grid density stepper ────────────────────────────────── */
    .lg-grid-stepper {
      display: inline-flex; align-items: center; gap: 3px;
      font-family: var(--font-mono); font-size: 0.74rem; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); padding: 2px 7px;
    }
    .lg-gstepper-label { margin-right: 2px; }
    .lg-gstepper-sep   { margin: 0 1px; }
    .lg-gstepper-val   { min-width: 1.6ch; text-align: center; font-weight: 600; color: var(--text-primary); }
    .lg-gstepper-btn, .lg-gstepper-reset {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px;
      background: none; border: none; border-radius: 4px;
      cursor: pointer; font-size: 0.85rem; line-height: 1;
      color: var(--text-secondary); padding: 0;
      transition: background 0.12s, color 0.12s;
    }
    .lg-gstepper-btn:hover:not(:disabled), .lg-gstepper-reset:hover {
      background: var(--border-subtle); color: var(--text-primary);
    }
    .lg-gstepper-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .lg-gstepper-reset { margin-left: 3px; font-size: 0.80rem; }

    /* ─── Stage area ──────────────────────────────────────────── */
    .lg-stage-wrap {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 28px 16px;
    }
    .lg-stage {
      position: relative;
      width: min(100%, 720px);
      max-width: 100%;
    }
    .lg-stage-meta {
      position: absolute; top: -22px; left: 2px;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; color: var(--text-muted);
    }
    .lg-stage-meta .pill {
      background: var(--surface); border: 1px solid var(--border-subtle);
      padding: 2px 7px; border-radius: 999px;
      font-family: var(--font-mono); font-size: 0.70rem;
    }
    .lg-stage-canvas {
      position: relative;
      aspect-ratio: var(--label-aspect, 2.56 / 1);
      border-radius: 12px; overflow: hidden;
      background: #ffffff;
      border: 1.5px solid var(--border);
      box-shadow: 0 24px 48px rgba(15,23,42,0.10), 0 6px 14px rgba(15,23,42,0.05);
      user-select: none; touch-action: none;
    }
    .lg-stage-grid {
      position: absolute; inset: 0; pointer-events: none;
    }
    .lg-stage-grid.lines {
      background-image:
        linear-gradient(to right,  rgba(55,53,47,0.10) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(55,53,47,0.10) 1px, transparent 1px);
      background-size: calc(100% / var(--grid-cols, 8)) calc(100% / var(--grid-rows, 3));
    }

    /* ─── Field blocks on canvas ──────────────────────────────── */
    .lg-field {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      padding: 6px; border-radius: 8px;
      border: 1.5px solid; cursor: grab;
      overflow: hidden; transition: box-shadow 0.12s;
    }
    .lg-field:hover { box-shadow: 0 0 0 3px rgba(15,23,42,0.05); }
    .lg-field.selected {
      box-shadow: 0 0 0 3px rgba(47,95,211,0.18), 0 6px 16px rgba(15,23,42,0.08);
      z-index: 2;
    }
    .lg-field.overlap { box-shadow: 0 0 0 3px rgba(217,119,6,0.25); }
    .lg-field--datamatrix { background: var(--green-bg); border-color: var(--green-border); }
    .lg-field--datamatrix.selected { border-color: var(--green); }
    .lg-field--csvText { background: var(--blue-bg); border-color: var(--blue-border); }
    .lg-field--csvText.selected { border-color: var(--blue); }
    .lg-field--staticText { background: var(--amber-bg); border-color: var(--amber-border); }
    .lg-field--staticText.selected { border-color: var(--amber); }

    .lg-field-inner {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; padding: 2px;
    }
    .lg-field-icon { opacity: 0.7; }
    .lg-field-icon svg { width: 11px; height: 11px; }
    .lg-field-name {
      font-size: 0.72rem; font-weight: 600;
      color: var(--text); text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 100%;
    }
    .lg-field-handle {
      position: absolute; right: 2px; bottom: 2px;
      width: 12px; height: 12px;
      border-right: 2px solid currentColor; border-bottom: 2px solid currentColor;
      cursor: nwse-resize; opacity: 0;
      transition: opacity 0.12s; color: var(--text-muted);
    }
    .lg-field:hover .lg-field-handle,
    .lg-field.selected .lg-field-handle { opacity: 0.85; }
    .lg-field-stamp {
      position: absolute; top: 3px; right: 4px;
      font-size: 0.60rem; font-family: var(--font-mono);
      color: var(--text-dim); opacity: 0;
      transition: opacity 0.12s;
    }
    .lg-field:hover .lg-field-stamp,
    .lg-field.selected .lg-field-stamp { opacity: 0.78; }

    /* ─── DataMatrix preview block on canvas ──────────────────── */
    .lg-dm-preview {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(12, 1fr);
      width: min(80%, 48px); height: min(80%, 48px);
      aspect-ratio: 1;
    }
    .lg-dm-preview span { background: currentColor; border-radius: 0; }

    /* ─── Overlap warning ─────────────────────────────────────── */
    .lg-overlap-warn {
      margin: 0 28px 8px;
      padding: 6px 12px;
      background: var(--yellow-bg); border: 1px solid var(--yellow-border);
      border-radius: var(--radius-md);
      font-size: 0.76rem; color: var(--text-secondary);
      display: none;
    }

    /* ─── Sample preview strip ────────────────────────────────── */
    .lg-samples {
      padding: 22px 28px 24px;
      border-top: 1px solid var(--border-subtle);
      background: rgba(255,255,255,0.65);
      flex-shrink: 0;
    }
    .lg-samples-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 10px;
    }
    .lg-samples-title {
      font-size: 0.71rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .lg-samples-sub {
      font-size: 0.72rem; font-family: var(--font-mono);
      color: var(--text-dim); margin-left: 6px;
    }
    .lg-meta-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.72rem; font-family: var(--font-mono);
      color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border-subtle);
      padding: 3px 8px; border-radius: 999px;
    }
    .lg-meta-pill svg { width: 11px; height: 11px; }
    .lg-samples-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 4px;
    }
    .lg-sample {
      position: relative; flex-shrink: 0;
      width: 200px;
      aspect-ratio: var(--label-aspect, 2.56 / 1);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      background: #fff; overflow: hidden;
    }
    .lg-sample-zone {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      padding: 3px;
    }
    .lg-sample-zone.dm { background: #1a1a1a; }
    .lg-sample-text {
      font-size: 9px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
    }
    .lg-sample-counter {
      position: absolute; bottom: 2px; right: 4px;
      font-size: 8px; font-family: var(--font-mono); color: var(--text-dim);
    }

    /* ─── Right rail: add field cards ─────────────────────────── */
    .lg-add-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .lg-add-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px 8px; gap: 4px;
      border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
      background: var(--surface); cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: inherit;
    }
    .lg-add-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .lg-add-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; color: var(--text-muted);
    }
    .lg-add-icon svg { width: 14px; height: 14px; }
    .lg-add-icon.dm   { background: var(--green-bg); color: var(--green-dark); }
    .lg-add-icon.csv  { background: var(--blue-bg);  color: var(--blue-dark);  }
    .lg-add-icon.stat { background: var(--amber-bg); color: var(--amber-dark); }
    .lg-add-title { font-size: 0.74rem; font-weight: 600; color: var(--text); text-align: center; }
    .lg-add-sub   { font-size: 0.66rem; color: var(--text-muted); text-align: center; }

    /* ─── Field list ──────────────────────────────────────────── */
    .lg-field-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
    .lg-field-card {
      display: grid; grid-template-columns: 28px 1fr auto;
      gap: 8px; align-items: center;
      padding: 9px 10px;
      border: 1px solid var(--border-subtle); border-radius: var(--radius-md);
      background: var(--surface); cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .lg-field-card:hover { border-color: var(--border); }
    .lg-field-card.selected {
      border-color: var(--blue-border); background: var(--blue-bg);
      box-shadow: 0 0 0 3px rgba(92,141,255,0.10);
    }
    .lg-field-chip {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lg-field-chip svg { width: 13px; height: 13px; }
    .lg-field-chip.dm   { background: var(--green-bg); color: var(--green-dark); }
    .lg-field-chip.csv  { background: var(--blue-bg);  color: var(--blue-dark);  }
    .lg-field-chip.stat { background: var(--amber-bg); color: var(--amber-dark); }
    .lg-field-meta-wrap { min-width: 0; }
    .lg-field-card-name { font-size: 0.82rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lg-field-card-sub  { font-size: 0.70rem; color: var(--text-muted); font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lg-field-card-r { display: flex; align-items: center; gap: 5px; }
    .lg-field-size { font-size: 0.68rem; font-family: var(--font-mono); color: var(--text-muted); background: var(--surface-subtle); padding: 2px 5px; border-radius: 4px; }
    .lg-field-x {
      width: 22px; height: 22px;
      border: 1px solid transparent; background: transparent;
      border-radius: 5px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.12s; padding: 0;
    }
    .lg-field-x svg { width: 11px; height: 11px; }
    .lg-field-x:hover { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }

    /* ─── Properties panel ────────────────────────────────────── */
    .lg-props {
      margin-top: 10px;
      background: var(--surface-subtle);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px;
    }
    .lg-props-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .lg-props-title { font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .lg-props-remove {
      font-size: 0.72rem; color: var(--red); background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 0;
    }
    .lg-props-remove:hover { text-decoration: underline; }
    .lg-props-form { display: flex; flex-direction: column; gap: 10px; }
    .lg-props-row { display: flex; flex-direction: column; gap: 4px; }
    .lg-props-two { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .lg-props-geom {
      display: flex; gap: 8px;
      font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono);
      padding-top: 4px; margin-top: 4px;
      border-top: 1px dashed var(--border-subtle);
    }
    .lg-props-geom b { color: var(--text); }
    .lg-input {
      width: 100%; padding: 6px 8px;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.82rem; color: var(--text);
      background: var(--surface); font-family: inherit;
    }
    .lg-input:focus { outline: 2px solid var(--blue); border-color: transparent; }

    /* ─── Sheet placement ─────────────────────────────────────── */
    .lg-sheet {
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 6px;
      box-shadow: var(--shadow-sm); margin-bottom: 10px;
      display: flex; align-items: stretch;
    }
    .lg-sheet-grid {
      display: grid; gap: 1px;
      width: 100%; height: 100%;
      min-height: 80px;
    }
    .lg-sheet-cell {
      background: var(--surface-subtle);
      border-radius: 1px; cursor: pointer;
      transition: background 0.08s; border: 1px solid transparent;
      min-width: 0; min-height: 0;
    }
    .lg-sheet-cell.use  { background: var(--blue-bg); border-color: var(--blue-border); }
    .lg-sheet-cell.use:hover { background: var(--blue-border); }
    .lg-sheet-cell.skip {
      background: repeating-linear-gradient(135deg, transparent 0 2px, rgba(0,0,0,0.40) 2px 4px);
      border-color: var(--border);
    }
    .lg-sheet-cell.past {
      background: repeating-linear-gradient(135deg, transparent 0 2px, rgba(0,0,0,0.40) 2px 4px);
      border-color: var(--border);
      cursor: not-allowed;
      /* background: var(--surface-subtle); opacity: 0.4; cursor: not-allowed; */
    }
    .lg-sheet-cell.available { background: var(--surface-subtle); border-color: transparent; opacity: 0.35; cursor: default; }
    .lg-sheet--mode-start .lg-sheet-cell.past { cursor: pointer; opacity: 0.55; }
    .lg-sheet--mode-start .lg-sheet-cell.past:hover { opacity: 0.8; }
    .lg-sheet { max-height: 150px; }
    .lg-sheet-card-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
      margin: 10px 0 4px;
    }
    .lg-sheet-cell.start {
      background: var(--green); border-color: var(--green-dark);
      box-shadow: 0 0 0 2px var(--green-bg); z-index: 1;
    }
    .lg-sheet-stats {
      display: flex; flex-wrap: wrap; gap: 10px;
      font-size: 0.72rem; color: var(--text-secondary); margin-bottom: 6px;
    }
    .lg-sheet-stat { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); }
    .lg-sheet-stat .swatch {
      width: 10px; height: 10px; border-radius: 2px; border: 1px solid var(--border);
    }
    .lg-sheet-stat .swatch.use   { background: var(--blue-bg); border-color: var(--blue-border); }
    .lg-sheet-stat .swatch.skip  { background: repeating-linear-gradient(135deg, transparent 0 2px, rgba(0,0,0,0.20) 2px 4px); }
    .lg-sheet-stat .swatch.start { background: var(--green); border-color: var(--green-dark); }
    .lg-sheet-hint { font-size: 0.70rem; color: var(--text-muted); line-height: 1.5; }
    .lg-sheet-hint b { color: var(--text-secondary); }

    /* ─── Status bar above bottom bar ─────────────────────────── */
    .lg-status-bar {
      font-size: 0.76rem; color: var(--text-muted);
      padding: 4px 24px; text-align: right;
      background: rgba(255,255,255,0.9);
      border-top: 1px solid var(--border-subtle);
    }
    .lg-status-bar.ok   { color: var(--green-dark); }
    .lg-status-bar.warn { color: var(--yellow-dark); }
    .lg-status-bar.err  { color: var(--red); }

    /* ─── Bottom action bar ───────────────────────────────────── */
    .lg-bottom-bar {
      position: sticky; bottom: 0; z-index: 30; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; padding: 0 24px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid var(--border-subtle);
      box-shadow: 0 -4px 12px rgba(15,23,42,0.04);
    }
    .lg-bottom-info { display: flex; align-items: center; gap: 20px; }
    .lg-bottom-stat { line-height: 1.1; }
    .lg-bottom-stat-num {
      font-size: 1.35rem; font-weight: 700;
      font-variant-numeric: tabular-nums; color: var(--text);
      letter-spacing: -0.01em;
    }
    .lg-bottom-stat-lbl { font-size: 0.70rem; color: var(--text-muted); font-weight: 500; margin-top: 1px; }
    .lg-bottom-divider { width: 1px; height: 32px; background: var(--border-subtle); }
    .lg-bottom-actions { display: flex; gap: 8px; }
    /* Bottom-bar buttons use shared .lt-btn / .lt-btn-ghost / .lt-btn-primary */
    .lg-bottom-actions .lt-btn svg { width: 13px; height: 13px; }
    .lg-bottom-actions .lt-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Export status / toast ───────────────────────────────── */
    .lg-export-status {
      display: none;
      font-size: 0.76rem; color: var(--text-muted);
      padding: 0 0 0 4px;
    }
    .lg-export-status.visible { display: block; }
    .lg-export-status.ok   { color: var(--green-dark); }
    .lg-export-status.warn { color: var(--yellow-dark); }
    .lg-export-status.err  { color: var(--red); }

    /* ─── PDF preview (hidden, full-screen modal style) ───────── */
    .lg-pdf-modal {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.55); align-items: center; justify-content: center;
    }
    .lg-pdf-modal.open { display: flex; }
    .lg-pdf-modal-inner {
      background: var(--surface); border-radius: var(--radius-lg);
      width: min(90vw, 900px); height: min(88vh, 760px);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .lg-pdf-modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border-subtle);
    }
    .lg-pdf-modal-head h3 { font-size: 0.92rem; color: var(--text); }
    .lg-pdf-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); display: flex; padding: 4px;
    }
    .lg-pdf-close svg { width: 16px; height: 16px; }
    .lg-pdf-close:hover { color: var(--text); }
    #pdf-preview { flex: 1; width: 100%; border: none; }

    /* ─── Responsive breakpoints ──────────────────────────────── */
    @media (max-width: 1280px) {
      .lg-workspace { grid-template-columns: 260px minmax(0, 1fr) 304px; }
    }
    @media (max-width: 1100px) {
      .lg-workspace { grid-template-columns: 232px minmax(0, 1fr) 280px; }
      .lg-stage-wrap { padding: 22px 18px 12px; }
      .lg-canvas-header { padding: 12px 18px; }
      .lg-samples { padding: 14px 18px 18px; }
      .lg-rail-section { padding: 12px 14px 10px; }
      .lg-bottom-bar { padding: 0 18px; }
      .lg-bottom-info { gap: 14px; }
      .lg-canvas-hint { display: none; }
      .lg-nav-pill { display: none; }
    }
    @media (max-width: 820px) {
      .lg-workspace {
        grid-template-columns: 1fr;
        height: auto; min-height: auto;
      }
      .lg-rail { border: none; border-bottom: 1px solid var(--border-subtle); max-height: none; overflow: visible; }
      .lg-rail-right { border-top: 1px solid var(--border-subtle); }
      .lg-center { min-height: 400px; }
      .lg-stage-wrap { padding: 20px 16px 12px; }
      .lg-bottom-bar { position: static; height: auto; padding: 14px 18px; }
    }
  </style>
</head>
<body>

<!-- ── Top nav ──────────────────────────────────────────────── -->
<nav class="lt-nav" id="lg-nav">
  <a class="lt-nav-brand" href="../../index.html">🔬 LabTools</a>
  <span class="lt-nav-sep">/</span>
  <span class="lt-nav-page">Label Generator</span>
  <span class="lg-nav-spacer"></span>
  <span class="lg-nav-pill" id="nav-pill-rows" style="display:none;">
    <!-- database icon + N rows — rendered by JS -->
  </span>
  <span class="lg-nav-pill" id="nav-pill-size" style="display:none;">
    <!-- sheet/thermal icon + label size — rendered by JS -->
  </span>
  <button class="lg-nav-action" id="save-template-btn" type="button">
    <!-- save icon + label rendered by JS -->
  </button>
</nav>

<!-- ── Main workspace ───────────────────────────────────────── -->
<div class="lg-workspace">

  <!-- ── Left rail ────────────────────────────────────────── -->
  <aside class="lg-rail lg-rail-left" id="left-rail">

    <!-- Data source -->
    <section class="lg-rail-section" id="csv-section">
      <div class="lg-section-head">
        <div class="lg-section-title">Data source</div>
        <div class="lg-section-aux" id="csv-row-count"></div>
      </div>
      <div id="csv-content"><!-- rendered by JS --></div>
      <input type="file" accept=".csv,.txt,text/csv" id="csv-file-input" hidden />
      <details class="lg-paste-details" id="paste-details">
        <summary id="paste-summary">Paste CSV directly</summary>
        <textarea class="lt-input lt-textarea lg-paste-area" id="csv-textarea" rows="5"
          placeholder="Sample ID,Name,Date…"></textarea>
        <div class="lg-parse-opts">
          <div>
            <label class="lg-field-label" for="delimiter-select">Delimiter</label>
            <select class="lg-select" id="delimiter-select">
              <option value="auto">Auto-detect</option>
              <option value=",">Comma ( , )</option>
              <option value="&#9;">Tab</option>
              <option value=";">Semicolon ( ; )</option>
            </select>
          </div>
          <div>
            <span class="lg-field-label" style="visibility:hidden;" aria-hidden="true">&nbsp;</span>
            <label class="lg-checkbox" style="margin-top:0;">
              <input type="checkbox" id="first-row-header" checked />
              <span>Header row</span>
            </label>
          </div>
        </div>
      </details>
    </section>

    <!-- Output format -->
    <section class="lg-rail-section" id="format-section">
      <div class="lg-section-head">
        <div class="lg-section-title">Output format</div>
      </div>
      <div class="lt-segmented" style="margin-bottom:12px;display:flex;">
        <button type="button" class="lt-segmented-btn" id="laser-mode-btn" style="flex:1;"><!-- JS --></button>
        <button type="button" class="lt-segmented-btn" id="thermal-mode-btn" style="flex:1;"><!-- JS --></button>
      </div>
      <label class="lg-field-label" for="unified-preset-select">Preset</label>
      <select class="lg-select" id="unified-preset-select"></select>

      <!-- Custom laser preset editor (shown only when Custom laser sheet selected) -->
      <div id="custom-laser-form" class="lg-custom-form" style="display:none;">
        <label for="cp-label-w">Label W (in)</label><input id="cp-label-w" type="number" min="0.1" step="0.01" />
        <label for="cp-label-h">Label H (in)</label><input id="cp-label-h" type="number" min="0.1" step="0.01" />
        <label for="cp-page-w">Page W (in)</label><input id="cp-page-w" type="number" min="1" step="0.1" />
        <label for="cp-page-h">Page H (in)</label><input id="cp-page-h" type="number" min="1" step="0.1" />
        <label for="cp-cols">Columns</label><input id="cp-cols" type="number" min="1" step="1" />
        <label for="cp-rows">Rows</label><input id="cp-rows" type="number" min="1" step="1" />
        <label for="cp-top-margin">Top margin</label><input id="cp-top-margin" type="number" min="0" step="0.001" />
        <label for="cp-left-margin">Left margin</label><input id="cp-left-margin" type="number" min="0" step="0.001" />
        <label for="cp-h-pitch">H. pitch</label><input id="cp-h-pitch" type="number" min="0.01" step="0.01" />
        <label for="cp-v-pitch">V. pitch</label><input id="cp-v-pitch" type="number" min="0.01" step="0.01" />
      </div>

      <!-- Custom thermal preset editor (shown only when Custom thermal label selected) -->
      <div id="custom-thermal-form" class="lg-custom-form" style="display:none;">
        <label for="cp-t-label-w">Label W (in)</label><input id="cp-t-label-w" type="number" min="0.1" step="0.01" />
        <label for="cp-t-label-h">Label H (in)</label><input id="cp-t-label-h" type="number" min="0.1" step="0.01" />
      </div>

      <dl class="lg-kv" id="preset-kv"><!-- rendered by JS --></dl>
    </section>

    <!-- Template actions -->
    <div class="lg-tmpl-actions">
      <button class="lg-link-btn" id="load-template-btn" type="button">Load template</button>
      <button class="lg-link-btn" id="reset-template-btn" type="button">Reset</button>
    </div>

  </aside>

  <!-- ── Center canvas ─────────────────────────────────────── -->
  <main class="lg-center" id="center">

    <div class="lg-canvas-header" id="canvas-header">
      <div class="lg-canvas-head-l">
        <div class="lg-canvas-title" id="canvas-title"><!-- rendered by JS --></div>
        <span class="lg-canvas-dim" id="canvas-dim-label"></span>
        <div class="lg-grid-stepper" id="canvas-dim-grid">
          <span class="lg-gstepper-label">grid</span>
          <button class="lg-gstepper-btn" id="grid-cols-dec" type="button" aria-label="Fewer columns">−</button>
          <span class="lg-gstepper-val" id="grid-cols-val">8</span>
          <button class="lg-gstepper-btn" id="grid-cols-inc" type="button" aria-label="More columns">+</button>
          <span class="lg-gstepper-sep">×</span>
          <button class="lg-gstepper-btn" id="grid-rows-dec" type="button" aria-label="Fewer rows">−</button>
          <span class="lg-gstepper-val" id="grid-rows-val">3</span>
          <button class="lg-gstepper-btn" id="grid-rows-inc" type="button" aria-label="More rows">+</button>
          <button class="lg-gstepper-reset" id="grid-reset" type="button" title="Reset to auto">↺</button>
        </div>
      </div>
      <div class="lg-canvas-hint">Drag fields on the label · resize from the corner handle · arrow keys to nudge</div>
    </div>

    <div class="lg-stage-wrap">
      <div class="lg-stage" id="lg-stage">
        <div class="lg-stage-meta">
          <span class="pill" id="stage-pill-w"></span>
          <span style="color:var(--text-dim);">×</span>
          <span class="pill" id="stage-pill-h"></span>
        </div>
        <div class="lg-stage-canvas" id="lg-stage-canvas">
          <!-- grid overlay + fields rendered by JS -->
        </div>
      </div>
    </div>

    <div class="lg-overlap-warn" id="overlap-warning"></div>

    <div class="lg-samples" id="samples-section" style="display:none;">
      <!-- rendered by JS -->
    </div>

  </main>

  <!-- ── Right rail ────────────────────────────────────────── -->
  <aside class="lg-rail lg-rail-right" id="right-rail">

    <!-- Label content -->
    <section class="lg-rail-section">
      <div class="lg-section-head">
        <div class="lg-section-title">Label content</div>
        <div class="lg-section-aux" id="field-count-badge">0 fields</div>
      </div>

      <div class="lg-add-grid">
        <button class="lg-add-card" id="add-datamatrix-btn" type="button">
          <div class="lg-add-icon dm"><!-- JS --></div>
          <div class="lg-add-title">DataMatrix</div>
          <div class="lg-add-sub">scannable code</div>
        </button>
        <button class="lg-add-card" id="add-csv-btn" type="button">
          <div class="lg-add-icon csv"><!-- JS --></div>
          <div class="lg-add-title">CSV field</div>
          <div class="lg-add-sub">from column</div>
        </button>
        <button class="lg-add-card" id="add-static-btn" type="button">
          <div class="lg-add-icon stat"><!-- JS --></div>
          <div class="lg-add-title">Static</div>
          <div class="lg-add-sub">fixed text</div>
        </button>
      </div>

      <div class="lg-field-list" id="field-list"><!-- rendered by JS --></div>

      <div class="lg-props" id="props-panel" style="display:none;">
        <div class="lg-props-head">
          <div class="lg-props-title">Properties</div>
          <button class="lg-props-remove" id="remove-field-btn" type="button">Remove</button>
        </div>
        <div class="lg-props-form">
          <div class="lg-props-row">
            <label class="lg-field-label" for="field-label-input">Field name</label>
            <input class="lg-input" id="field-label-input" type="text" />
          </div>
          <div class="lg-props-row" id="source-column-row">
            <label class="lg-field-label" for="field-source-select" id="source-column-label">CSV column</label>
            <select class="lg-select" id="field-source-select"></select>
          </div>
          <div class="lg-props-row" id="static-text-row" style="display:none;">
            <label class="lg-field-label" for="field-static-input">Static text</label>
            <input class="lg-input" id="field-static-input" type="text" />
          </div>
          <div class="lg-props-two">
            <div class="lg-props-row">
              <label class="lg-field-label" for="field-align-select">Alignment</label>
              <select class="lg-select" id="field-align-select">
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
              </select>
            </div>
            <div class="lg-props-row">
              <label class="lg-field-label" for="field-font-scale">Font scale</label>
              <input class="lg-input" id="field-font-scale" type="number" min="0.6" max="2.0" step="0.1" value="1.0" />
            </div>
          </div>
          <div class="lg-props-geom" id="props-geom"></div>
        </div>
      </div>
    </section>

    <!-- Sheet placement (laser mode only) -->
    <section class="lg-rail-section" id="placement-section">
      <div class="lg-section-head">
        <div class="lg-section-title">Sheet placement</div>
        <div class="lg-section-aux" id="placement-grid-badge"></div>
      </div>
      <div id="placement-content"><!-- rendered by JS --></div>
    </section>

  </aside>

</div>

<!-- ── Bottom action bar ─────────────────────────────────────── -->
<div class="lg-bottom-bar" id="bottom-bar">
  <div class="lg-bottom-info" id="bottom-info"><!-- rendered by JS --></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="lg-export-status" id="export-status"></span>
    <div class="lg-bottom-actions">
      <button class="lt-btn lt-btn-ghost" id="download-btn" type="button" disabled><!-- JS --></button>
      <button class="lt-btn lt-btn-primary" id="generate-btn" type="button" disabled><!-- JS --></button>
    </div>
  </div>
</div>

<!-- ── PDF preview modal ──────────────────────────────────────── -->
<div class="lg-pdf-modal" id="pdf-modal">
  <div class="lg-pdf-modal-inner">
    <div class="lg-pdf-modal-head">
      <h3>PDF Preview</h3>
      <button class="lg-pdf-close" id="pdf-modal-close" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    </div>
    <iframe id="pdf-preview" title="PDF Preview"></iframe>
  </div>
</div>

<footer class="lt-footer">LabTools · Label Generator</footer>

<script src="./tool.js"></script>
</body>
</html>
