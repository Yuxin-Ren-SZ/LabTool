<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BCA Calculator — Layout Directions</title>
  <link rel="stylesheet" href="../../assets/css/labtools.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    .ab-frame { width: 1180px; height: 940px; border: 0; display: block; background: var(--bg); }
    .ab-cap { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; padding: 4px 2px 0; max-width: 1100px; }
    .ab-cap b { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function Frame({ layout }) {
      return <iframe className="ab-frame" src={`app.html?layout=${layout}&embed=1`} title={layout} />;
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="bca" title="BCA Assay Calculator — redesign" subtitle="Import-first · three layout directions. Each frame below is live — click in, open a file or switch to Manual, assign wells, read results. Use ⤢ focus to try one full-screen.">
            <DCArtboard id="twopane" label="A · Two-pane live" width={1180} height={1000}>
              <Frame layout="twopane" />
              <div className="ab-cap"><b>Everything on one screen.</b> Import + plate + assignment on the left, a sticky live-results panel on the right that updates as you map wells. Best for a power user who wants the curve and the numbers always in view. (Collapses to single column on a narrow window.)</div>
            </DCArtboard>
            <DCArtboard id="flow" label="B · Single vertical flow" width={1180} height={1000}>
              <Frame layout="flow" />
              <div className="ab-cap"><b>Top-to-bottom story.</b> Import → map wells → results, stacked full-width, results render inline with a big chart beside the sample table. Calm and scannable; reads like a worksheet.</div>
            </DCArtboard>
            <DCArtboard id="stepper" label="C · Guided steps" width={1180} height={1000}>
              <Frame layout="stepper" />
              <div className="ab-cap"><b>One thing at a time.</b> A 1·2·3 stepper (Import → Map wells → Results) shows a single focused panel per step with a large results dashboard at the end. Friendliest for occasional users; least dense.</div>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
